# Include this location inside the TLS server block for newapi.doitbenai.cloud.
# It is intentionally isolated from /v1/videos and the existing media router.
location ^~ /_shanhai-provider-media/ {
    # Signed query parameters must never be retained in the Nginx access log.
    access_log off;
    log_not_found off;

    proxy_pass http://127.0.0.1:8201/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;

    proxy_hide_header Cache-Control;
    add_header Cache-Control "no-store" always;
    add_header X-Content-Type-Options "nosniff" always;
}
