name: shanhaiedu

services:
  postgres:
    image: postgres:16.14-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
    environment:
      POSTGRES_USER: ${SHANHAI_POSTGRES_USER:-shanhai}
      POSTGRES_PASSWORD: ${SHANHAI_POSTGRES_PASSWORD:-shanhai-local-only}
      POSTGRES_DB: ${SHANHAI_POSTGRES_DB:-shanhai}
    ports:
      - "127.0.0.1:${SHANHAI_POSTGRES_PORT:-55432}:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 5s
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7.4.9-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:${SHANHAI_REDIS_PORT:-56379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 3s
    volumes:
      - redis_data:/data
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${SHANHAI_MINIO_ROOT_USER:-shanhai-local}
      MINIO_ROOT_PASSWORD: ${SHANHAI_MINIO_ROOT_PASSWORD:-shanhai-local-only}
    ports:
      - "127.0.0.1:${SHANHAI_MINIO_API_PORT:-59000}:9000"
      - "127.0.0.1:${SHANHAI_MINIO_CONSOLE_PORT:-59001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/ready"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 5s
    volumes:
      - minio_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
