openapi: 3.1.0
info:
  title: ShanHaiEdu Frontend Integration Surface
  version: 2.0.0
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
  description: >-
    前端联调合同。以仓库根 contracts/api-surface.openapi.yaml 为核心子集，
    其余路径为前端按 contracts/api-conventions.md 约定提出的兼容性扩展；
    真实联调以后端生成 OpenAPI 为准，本文件不得改变核心合同已定义语义。
servers:
  - url: /api/v2
security:
  - cookieAuth: []
paths:
  # ── 会话 ──────────────────────────────────────────────
  /auth/login:
    post:
      summary: 邮箱密码登录
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [email, password]
              properties:
                email: {type: string, format: email}
                password: {type: string, minLength: 8}
      responses:
        '200':
          description: Session established via cookie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionEnvelope'
        '4XX':
          $ref: '#/components/responses/Error'
  /auth/logout:
    post:
      summary: 退出登录
      operationId: logout
      responses:
        '204':
          description: Session cleared
        '4XX':
          $ref: '#/components/responses/Error'
  /auth/me:
    get:
      summary: 当前用户
      operationId: getMe
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionEnvelope'
        '4XX':
          $ref: '#/components/responses/Error'
  # ── 主页 ──────────────────────────────────────────────
  /home/overview:
    get:
      summary: 主页聚合（继续创作、待处理、最近成果）
      operationId: getHomeOverview
      responses:
        '200':
          description: Home overview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomeOverviewEnvelope'
        '4XX':
          $ref: '#/components/responses/Error'
  # ── 项目（核心合同） ─────────────────────────────────
  /projects:
    get:
      summary: 查询项目列表
      operationId: listProjects
      parameters:
        - $ref: '#/components/parameters/PageCursor'
        - $ref: '#/components/parameters/PageLimit'
      responses:
        '200':
          description: Project page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectListEnvelope'
        '4XX':
          $ref: '#/components/responses/Error'
    post:
      summary: 创建单知识点项目
      operationId: createProject
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectEnvelope'
        '4XX':
          $ref: '#/components/responses/Error'
  /projects/{project_id}:
    get:
      summary: 获取项目详情
      operationId: getProject
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Project
          headers:
            ETag:
              schema: {type: string}
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectEnvelope'
        '4XX':
          $ref: '#/components/responses/Error'
    patch:
      summary: 更新项目设置
      operationId: updateProject
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                title: {type: string, minLength: 1}
                automation_mode:
                  $ref: '#/components/schemas/AutomationMode'
      responses:
        '200':
          description: Updated project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectEnvelope'
        '4XX':
          $ref: '#/components/responses/Error'
  /projects/{project_id}/workflow:
    get:
      summary: 获取项目工作台聚合状态
      operationId: getProjectWorkflow
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Aggregated workbench state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowEnvelope'
        '4XX':
          $ref: '#/components/responses/Error'
  /projects/{project_id}/events/stream:
    get:
      summary: 订阅项目实时事件
      operationId: streamProjectEvents
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - name: Last-Event-ID
          in: header
          required: false
          schema: {type: string}
      responses:
        '200':
          description: Server-sent event stream; data follows sse-event.schema.json
          content:
            text/event-stream:
              schema: {type: string}
        '4XX':
          $ref: '#/components/responses/Error'
  /events/stream:
    get:
      summary: 订阅当前用户全局事件
      operationId: streamUserEvents
      parameters:
        - name: Last-Event-ID
          in: header
          required: false
          schema: {type: string}
      responses:
        '200':
          description: Server-sent event stream; data follows sse-event.schema.json
          content:
            text/event-stream:
              schema: {type: string}
        '4XX':
          $ref: '#/components/responses/Error'
  # ── 教材上传与解析 ───────────────────────────────────
  /projects/{project_id}/upload-sessions:
    post:
      summary: 创建教材直传会话
      operationId: createUploadSession
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [file_name, size_bytes, mime_type]
              properties:
                file_name: {type: string, minLength: 1}
                size_bytes: {type: integer, minimum: 1}
                mime_type: {type: string, minLength: 1}
      responses:
        '201':
          description: Upload session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadSessionEnvelope'
        '4XX':
          $ref: '#/components/responses/Error'
  /upload-sessions/{upload_session_id}/complete:
    post:
      summary: 直传完成，触发扫描与解析
      operationId: completeUploadSession
      parameters:
        - name: upload_session_id
          in: path
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [size_bytes]
              properties:
                size_bytes: {type: integer, minimum: 1}
                sha256: {type: [string, 'null']}
      responses:
        '202':
          $ref: '#/components/responses/AcceptedJob'
        '4XX':
          $ref: '#/components/responses/Error'
  /projects/{project_id}/material:
    get:
      summary: 教材与解析证据
      operationId: getProjectMaterial
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Material state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaterialEnvelope'
        '4XX':
          $ref: '#/components/responses/Error'
  /projects/{project_id}/material/confirm-scope:
    post:
      summary: 教师确认教材范围
      operationId: confirmMaterialScope
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                note: {type: [string, 'null']}
      responses:
        '200':
          description: Scope confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaterialEnvelope'
        '4XX':
          $ref: '#/components/responses/Error'
  # ── 课时划分与课时 ───────────────────────────────────
  /projects/{project_id}/lesson-division:
    get:
      summary: 课时划分草稿
      operationId: getLessonDivision
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Division draft
          headers:
            ETag:
              schema: {type: string}
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LessonDivisionEnvelope'
        '4XX':
          $ref: '#/components/responses/Error'
    put:
      summary: 保存课时划分草稿（增删排序）
      operationId: updateLessonDivision
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [entries]
              properties:
                entries:
                  type: array
                  minItems: 1
                  items:
                    $ref: '#/components/schemas/LessonDivisionEntryInput'
      responses:
        '200':
          description: Division draft saved
          headers:
            ETag:
              schema: {type: string}
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LessonDivisionEnvelope'
        '4XX':
          $ref: '#/components/responses/Error'
  /projects/{project_id}/lesson-division/approve:
    post:
      summary: 批准课时划分并创建课时
      operationId: approveLessonDivision
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Division approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LessonDivisionEnvelope'
        '4XX':
          $ref: '#/components/responses/Error'
  /projects/{project_id}/lessons:
    get:
      summary: 项目课时列表
      operationId: listLessons
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Lessons
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LessonListEnvelope'
        '4XX':
          $ref: '#/components/responses/Error'
  /lessons/{lesson_id}:
    get:
      summary: 课时详情与分支状态
      operationId: getLesson
      parameters:
        - $ref: '#/components/parameters/LessonId'
      responses:
        '200':
          description: Lesson
          headers:
            ETag:
              schema: {type: string}
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LessonEnvelope'
        '4XX':
          $ref: '#/components/responses/Error'
    patch:
      summary: 启用或停用可选分支
      operationId: updateLesson
      parameters:
        - $ref: '#/components/parameters/LessonId'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                ppt_enabled: {type: boolean}
                video_enabled: {type: boolean}
                intro_enabled: {type: boolean}
      responses:
        '200':
          description: Lesson updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LessonEnvelope'
        '4XX':
          $ref: '#/components/responses/Error'
  /lessons/{lesson_id}/node-runs:
    get:
      summary: 课时工作台步骤列表
      operationId: listLessonNodeRuns
      parameters:
        - $ref: '#/components/parameters/LessonId'
      responses:
        '200':
          description: Node runs of the lesson
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeRunListEnvelope'
        '4XX':
          $ref: '#/components/responses/Error'
  # ── 节点运行（核心合同 + 扩展） ──────────────────────
  /node-runs/{node_run_id}:
    get:
      summary: 节点运行详情（当前作品、任务、校验、版本）
      operationId: getNodeRun
      parameters:
        - $ref: '#/components/parameters/NodeRunId'
      responses:
        '200':
          description: Node run detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeRunDetailEnvelope'
        '4XX':
          $ref: '#/components/responses/Error'
  /node-runs/{node_run_id}/prompt-preview:
    get:
      summary: 获取节点最终业务提示词预览
      operationId: getPromptPreview
      parameters:
        - $ref: '#/components/parameters/NodeRunId'
      responses:
        '200':
          description: Editable business prompt and locked layer summaries
          headers:
            ETag:
              schema: {type: string}
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptPreviewEnvelope'
        '4XX':
          $ref: '#/components/responses/Error'
  /node-runs/{node_run_id}/prompt:
    put:
      summary: 保存教师修改后的业务提示词
      operationId: savePromptRevision
      parameters:
        - $ref: '#/components/parameters/NodeRunId'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [editable_prompt]
              properties:
                editable_prompt: {type: string, minLength: 1}
      responses:
        '200':
          description: New prompt revision
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptRevisionEnvelope'
        '4XX':
          $ref: '#/components/responses/Error'
  /node-runs/{node_run_id}/start:
    post:
      summary: 启动节点运行
      operationId: startNodeRun
      parameters:
        - $ref: '#/components/parameters/NodeRunId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt_revision_id: {type: string, format: uuid}
      responses:
        '202':
          $ref: '#/components/responses/AcceptedJob'
        '4XX':
          $ref: '#/components/responses/Error'
  /node-runs/{node_run_id}/transitions:
    post:
      summary: 跳过、恢复、采用旧版或确认过期
      operationId: transitionNodeRun
      parameters:
        - $ref: '#/components/parameters/NodeRunId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [action]
              properties:
                action: {enum: [skip, resume, keep_current_version, acknowledge_stale]}
                reason: {type: [string, 'null']}
      responses:
        '200':
          description: Node run after transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeRunEnvelope'
        '4XX':
          $ref: '#/components/responses/Error'
  /node-runs/{node_run_id}/creation-packages:
    post:
      summary: 从项目节点创建不可变创作包
      operationId: createCreationPackage
      parameters:
        - $ref: '#/components/parameters/NodeRunId'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '201':
          description: Immutable package created
          content:
            application/json:
              schema:
                type: object
                required: [data, request_id]
                properties:
                  data:
                    $ref: '../../../contracts/creation-package.schema.json'
                  request_id: {type: string}
        '4XX':
          $ref: '#/components/responses/Error'
  /node-runs/{node_run_id}/results:
    get:
      summary: 节点候选结果（封面、镜头、页面）
      operationId: listNodeRunResults
      parameters:
        - $ref: '#/components/parameters/NodeRunId'
        - name: item_key
          in: query
          required: false
          schema: {type: string}
      responses:
        '200':
          description: Generation results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerationResultListEnvelope'
        '4XX':
          $ref: '#/components/responses/Error'
  # ── 作品版本 ─────────────────────────────────────────
  /artifact-versions/{artifact_version_id}:
    get:
      summary: 作品版本内容
      operationId: getArtifactVersion
      parameters:
        - $ref: '#/components/parameters/ArtifactVersionId'
      responses:
        '200':
          description: Artifact version
          headers:
            ETag:
              schema: {type: string}
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactVersionEnvelope'
        '4XX':
          $ref: '#/components/responses/Error'
  /artifact-versions/{artifact_version_id}/content:
    put:
      summary: 保存教师直接编辑的内容
      operationId: updateArtifactContent
      parameters:
        - $ref: '#/components/parameters/ArtifactVersionId'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [content]
              properties:
                content: {type: object, additionalProperties: true}
      responses:
        '200':
          description: Content saved
          headers:
            ETag:
              schema: {type: string}
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactVersionEnvelope'
        '4XX':
          $ref: '#/components/responses/Error'
  /artifact-versions/{artifact_version_id}/approve:
    post:
      summary: 批准作品版本
      operationId: approveArtifactVersion
      parameters:
        - $ref: '#/components/parameters/ArtifactVersionId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                note: {type: [string, 'null']}
                acknowledged_warning_keys:
                  type: array
                  items: {type: string}
                acknowledgement_note: {type: [string, 'null']}
      responses:
        '200':
          description: Approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactVersionEnvelope'
        '4XX':
          $ref: '#/components/responses/Error'
  /artifact-versions/{artifact_version_id}/request-changes:
    post:
      summary: 提出修改并局部返修
      operationId: requestArtifactChanges
      parameters:
        - $ref: '#/components/parameters/ArtifactVersionId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [instruction]
              properties:
                instruction: {type: string, minLength: 1}
                scope_keys:
                  type: array
                  items: {type: string}
      responses:
        '202':
          $ref: '#/components/responses/AcceptedJob'
        '4XX':
          $ref: '#/components/responses/Error'
  # ── 三类九套（核心合同 + 扩展） ──────────────────────
  /lessons/{lesson_id}/intro-options:
    get:
      summary: 获取课时三类九套导入设计
      operationId: getLessonIntroOptions
      parameters:
        - $ref: '#/components/parameters/LessonId'
      responses:
        '200':
          description: Three categories and nine approved or draft introduction options
          headers:
            ETag:
              schema: {type: string}
          content:
            application/json:
              schema:
                type: object
                required: [data, request_id]
                properties:
                  data:
                    $ref: '../../../contracts/intro-option-set.schema.json'
                  request_id: {type: string}
        '4XX':
          $ref: '#/components/responses/Error'
  /lessons/{lesson_id}/intro-options/{option_key}:
    patch:
      summary: 修改某套方案的允许字段
      operationId: updateIntroOption
      parameters:
        - $ref: '#/components/parameters/LessonId'
        - name: option_key
          in: path
          required: true
          schema: {type: string}
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                title: {type: string, minLength: 1}
                independent_concept: {type: string, minLength: 1}
                hook: {type: string, minLength: 1}
                course_anchor: {type: string, minLength: 1}
                classroom_first_question: {type: string, minLength: 1}
                handoff_moment: {type: string, minLength: 1}
                must_not_preteach:
                  type: array
                  items: {type: string, minLength: 1}
      responses:
        '200':
          description: Updated option set
          headers:
            ETag:
              schema: {type: string}
          content:
            application/json:
              schema:
                type: object
                required: [data, request_id]
                properties:
                  data:
                    $ref: '../../../contracts/intro-option-set.schema.json'
                  request_id: {type: string}
        '4XX':
          $ref: '#/components/responses/Error'
  /lessons/{lesson_id}/intro-selections:
    post:
      summary: 选择一个课堂导入方案
      operationId: selectLessonIntroOption
      parameters:
        - $ref: '#/components/parameters/LessonId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [intro_option_set_version_id, option_key]
              properties:
                intro_option_set_version_id: {type: string, format: uuid}
                option_key: {type: string}
      responses:
        '201':
          description: Immutable active selection created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntroSelectionEnvelope'
        '4XX':
          $ref: '#/components/responses/Error'
  /lessons/{lesson_id}/intro-selections/current:
    get:
      summary: 当前生效的导入方案选择
      operationId: getCurrentIntroSelection
      parameters:
        - $ref: '#/components/parameters/LessonId'
      responses:
        '200':
          description: Current selection or null
          content:
            application/json:
              schema:
                type: object
                required: [data, request_id]
                properties:
                  data:
                    oneOf:
                      - $ref: '#/components/schemas/IntroSelection'
                      - type: 'null'
                  request_id: {type: string}
        '4XX':
          $ref: '#/components/responses/Error'
  # ── PPT 页级 ─────────────────────────────────────────
  /lessons/{lesson_id}/ppt-pages:
    get:
      summary: PPT 页面清单（含运行态）
      operationId: listPptPages
      parameters:
        - $ref: '#/components/parameters/LessonId'
      responses:
        '200':
          description: Page list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PptPageListEnvelope'
        '4XX':
          $ref: '#/components/responses/Error'
  /ppt-pages/{page_id}:
    get:
      summary: 单页四层规格与预览
      operationId: getPptPage
      parameters:
        - $ref: '#/components/parameters/PptPageId'
      responses:
        '200':
          description: Page detail
          headers:
            ETag:
              schema: {type: string}
