          in: query
          required: false
          schema: {type: string}
        - $ref: '#/components/parameters/PageCursor'
        - $ref: '#/components/parameters/PageLimit'
      responses:
        '200':
          description: Audit events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEventListEnvelope'
        '4XX':
          $ref: '#/components/responses/Error'
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: shanhai_session
  parameters:
    ProjectId:
      name: project_id
      in: path
      required: true
      schema: {type: string, format: uuid}
    NodeRunId:
      name: node_run_id
      in: path
      required: true
      schema: {type: string, format: uuid}
    LessonId:
      name: lesson_id
      in: path
      required: true
      schema: {type: string, format: uuid}
    BatchId:
      name: batch_id
      in: path
      required: true
      schema: {type: string, format: uuid}
    JobId:
      name: job_id
      in: path
      required: true
      schema: {type: string, format: uuid}
    ArtifactVersionId:
      name: artifact_version_id
      in: path
      required: true
      schema: {type: string, format: uuid}
    PptPageId:
      name: page_id
      in: path
      required: true
      schema: {type: string, format: uuid}
    VideoProjectId:
      name: video_project_id
      in: path
      required: true
      schema: {type: string, format: uuid}
    ContentPackageId:
      name: content_package_id
      in: path
      required: true
      schema: {type: string, format: uuid}
    ProviderId:
      name: provider_id
      in: path
      required: true
      schema: {type: string, format: uuid}
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: {type: string, minLength: 8, maxLength: 128}
    IfMatch:
      name: If-Match
      in: header
      required: true
      schema: {type: string}
    PageCursor:
      name: page[cursor]
      in: query
      required: false
      schema: {type: string}
    PageLimit:
      name: page[limit]
      in: query
      required: false
      schema: {type: integer, minimum: 1, maximum: 100, default: 20}
  responses:
    Error:
      description: Error envelope
      content:
        application/json:
          schema:
            $ref: '../../../contracts/error-envelope.schema.json'
    AcceptedJob:
      description: Long-running job accepted
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AcceptedJobEnvelope'
  schemas:
    AutomationMode:
      type: string
      enum: [manual, assisted, automatic]
    NodeStatus:
      $ref: '../../../contracts/workflow-node-status.schema.json'
    User:
      type: object
      required: [id, name, email, roles]
      properties:
        id: {type: string, format: uuid}
        name: {type: string}
        email: {type: string, format: email}
        roles:
          type: array
          items: {enum: [teacher, content_admin, model_admin, system_admin]}
    SessionEnvelope:
      type: object
      required: [data, request_id]
      properties:
        data:
          type: object
          required: [user]
          properties:
            user: {$ref: '#/components/schemas/User'}
        request_id: {type: string}
    HomeOverviewEnvelope:
      type: object
      required: [data, request_id]
      properties:
        data:
          type: object
          required: [is_new_user, continue_items, pending_actions, recent_artifacts, running_jobs]
          properties:
            is_new_user: {type: boolean}
            continue_items:
              type: array
              items:
                type: object
                required: [project_id, project_title, next_action, next_url]
                properties:
                  project_id: {type: string, format: uuid}
                  project_title: {type: string}
                  lesson_id: {type: [string, 'null'], format: uuid}
                  lesson_title: {type: [string, 'null']}
                  next_action: {type: string}
                  next_url: {type: string}
                  progress_summary: {type: [string, 'null']}
                  cover_asset_url: {type: [string, 'null']}
                  updated_at: {type: string, format: date-time}
            pending_actions:
              type: array
              items:
                type: object
                required: [kind, title, url]
                properties:
                  kind: {enum: [review_required, cover_selection, shot_failed, delivery_ready, budget_pause, stale_content]}
                  title: {type: string}
                  detail: {type: [string, 'null']}
                  url: {type: string}
                  project_title: {type: [string, 'null']}
                  occurred_at: {type: [string, 'null'], format: date-time}
            recent_artifacts:
              type: array
              items:
                type: object
                required: [id, kind, title]
                properties:
                  id: {type: string, format: uuid}
                  kind: {enum: [image, video_clip, ppt_page, document, audio]}
                  title: {type: string}
                  preview_url: {type: [string, 'null']}
                  project_title: {type: [string, 'null']}
                  url: {type: [string, 'null']}
            running_jobs:
              type: array
              items: {$ref: '#/components/schemas/GenerationJob'}
