components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: shanhai_session
  parameters:
    ProjectId:
      in: path
      name: projectId
      required: true
      schema: { type: string }
    LessonId:
      in: path
      name: lessonId
      required: true
      schema: { type: string }
    NodeKey:
      in: path
      name: nodeKey
      required: true
      schema: { type: string }
    VersionId:
      in: path
      name: versionId
      required: true
      schema: { type: string }
    TaskId:
      in: path
      name: taskId
      required: true
      schema: { type: string }
    ProviderId:
      in: path
      name: providerId
      required: true
      schema: { type: string }
    TemplateId:
      in: path
      name: templateId
      required: true
      schema: { type: string }
    Cursor:
      in: query
      name: cursor
      schema: { type: string }
    PageSize:
      in: query
      name: page_size
      schema: { type: integer, minimum: 1, maximum: 100, default: 30 }
    IdempotencyKey:
      in: header
      name: Idempotency-Key
      required: true
      schema: { type: string, minLength: 16, maxLength: 128 }
  responses:
    ErrorResponse:
      description: Error envelope
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    SessionResponse:
      description: Session envelope
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SessionEnvelope'
  schemas:
    Meta:
      type: object
      additionalProperties: false
      required: [trace_id, server_time]
      properties:
        trace_id: { type: string }
        server_time: { type: string, format: date-time }
        next_cursor: { type: [string, 'null'] }
    Error:
      type: object
      additionalProperties: false
      required: [code, message, retryable, trace_id]
      properties:
        code: { type: string }
        message: { type: string }
        retryable: { type: boolean }
        action: { type: [string, 'null'] }
        details: { type: object, additionalProperties: true }
        trace_id: { type: string }
    ErrorEnvelope:
      type: object
      additionalProperties: false
      required: [ok, error]
      properties:
        ok: { const: false }
        error: { $ref: '#/components/schemas/Error' }
    User:
      type: object
      additionalProperties: false
      required: [user_id, display_name, role]
      properties:
        user_id: { type: string }
        display_name: { type: string }
        email: { type: string, format: email }
        role: { enum: [teacher, template_admin, system_admin, audit_admin] }
        organization_id: { type: [string, 'null'] }
        organization_name: { type: [string, 'null'] }
    Session:
      type: object
      additionalProperties: false
      required: [user, csrf_token]
      properties:
        user: { $ref: '#/components/schemas/User' }
        csrf_token: { type: string }
    SessionEnvelope:
      type: object
      required: [ok, data, meta]
      properties:
        ok: { const: true }
        data: { $ref: '#/components/schemas/Session' }
        meta: { $ref: '#/components/schemas/Meta' }
    LoginRequest:
      type: object
      additionalProperties: false
      required: [identifier, password]
      properties:
        identifier: { type: string, minLength: 1 }
        password: { type: string, minLength: 1 }
    Project:
      type: object
      additionalProperties: false
      required: [project_id, name, subject, grade, status, execution_mode, row_version, updated_at]
      properties:
        project_id: { type: string }
        name: { type: string }
        subject: { const: primary_math }
        grade: { type: integer, minimum: 1, maximum: 6 }
        textbook_version: { type: string }
        volume: { type: string }
        status: { enum: [draft, active, archived] }
        execution_mode: { enum: [manual, semi_auto, full_auto_draft] }
        progress_percent: { type: integer, minimum: 0, maximum: 100 }
        textbook_status: { enum: [none, uploading, parsing, evidence_ready, parse_failed] }
        division_status: { enum: [none, generating, needs_review, approved, failed] }
        lesson_count: { type: integer, minimum: 0 }
        budget_minor_units: { type: integer, minimum: 0 }
        spent_minor_units: { type: integer, minimum: 0 }
        currency: { type: string }
        output_scope:
          type: object
          additionalProperties: false
          properties:
            ppt: { type: boolean }
            video: { type: boolean }
        row_version: { type: integer, minimum: 1 }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    CreateProjectRequest:
      type: object
      additionalProperties: false
      required: [name, subject, grade, execution_mode]
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        subject: { const: primary_math }
        grade: { type: integer, minimum: 1, maximum: 6 }
        textbook_version: { type: string }
        volume: { type: string }
        knowledge_scope: { type: string }
        execution_mode: { enum: [manual, semi_auto, full_auto_draft] }
        budget_minor_units: { type: integer, minimum: 0 }
        lesson_duration_minutes: { type: integer, minimum: 10, maximum: 120 }
        division_preference: { enum: [follow_textbook, fine_grained, coarse_grained] }
        output_scope:
          type: object
          additionalProperties: false
          properties:
            ppt: { type: boolean }
            video: { type: boolean }
        model_profile: { enum: [recommended, quality, economy, fast_draft] }
        textbook_file_object_id: { type: [string, 'null'] }
        textbook_library_id: { type: [string, 'null'] }
    UpdateProjectRequest:
      type: object
      additionalProperties: false
      required: [row_version]
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        execution_mode: { enum: [manual, semi_auto, full_auto_draft] }
        budget_minor_units: { type: integer, minimum: 0 }
        output_scope:
          type: object
          additionalProperties: false
          properties:
            ppt: { type: boolean }
            video: { type: boolean }
        row_version: { type: integer, minimum: 1 }
    ReviewItem:
      type: object
      additionalProperties: false
      required: [review_id, project_id, project_name, title, node_key, waiting_since]
      properties:
        review_id: { type: string }
        project_id: { type: string }
        project_name: { type: string }
        lesson_id: { type: [string, 'null'] }
        lesson_title: { type: [string, 'null'] }
        node_key: { type: string }
        artifact_version_id: { type: [string, 'null'] }
        title: { type: string }
        waiting_since: { type: string, format: date-time }
    RecentDelivery:
      type: object
      additionalProperties: false
      required: [project_id, project_name, file_object, delivered_at]
      properties:
        project_id: { type: string }
        project_name: { type: string }
        file_object: { $ref: '#/components/schemas/FileObject' }
        delivered_at: { type: string, format: date-time }
    HomeOverview:
      type: object
      additionalProperties: false
      required: [recent_projects, pending_reviews, running_tasks, failed_tasks, recent_deliveries]
      properties:
        recent_projects:
          type: array
          items: { $ref: '#/components/schemas/Project' }
        pending_reviews:
          type: array
          items: { $ref: '#/components/schemas/ReviewItem' }
        running_tasks:
          type: array
          items: { $ref: '#/components/schemas/Task' }
        failed_tasks:
          type: array
          items: { $ref: '#/components/schemas/Task' }
        recent_deliveries:
          type: array
          items: { $ref: '#/components/schemas/RecentDelivery' }
    HomeOverviewEnvelope:
      type: object
      required: [ok, data, meta]
      properties:
        ok: { const: true }
        data: { $ref: '#/components/schemas/HomeOverview' }
        meta: { $ref: '#/components/schemas/Meta' }
    Lesson:
      type: object
      additionalProperties: false
      required: [lesson_id, project_id, lesson_key, sequence_number, title, status]
      properties:
        lesson_id: { type: string }
        project_id: { type: string }
        lesson_key: { type: string }
        sequence_number: { type: integer, minimum: 1 }
        title: { type: string }
        lesson_type: { type: string }
        content_boundary: { type: object, additionalProperties: true }
        status: { enum: [active, archived] }
        stage_summary:
          type: object
          additionalProperties: false
          properties:
            lesson_plan: { $ref: '#/components/schemas/NodeStatus' }
            intro_design: { $ref: '#/components/schemas/NodeStatus' }
            ppt: { $ref: '#/components/schemas/NodeStatus' }
            video: { $ref: '#/components/schemas/NodeStatus' }
            delivery: { $ref: '#/components/schemas/NodeStatus' }
    NodeStatus:
      enum: [locked, ready, queued, running, needs_review, revision_required, approved, stale, failed, blocked, cancelled, skipped]
    NodeSummary:
      type: object
      additionalProperties: false
      required: [node_key, title, group, status]
      properties:
        node_key: { type: string }
        title: { type: string }
        group: { type: string }
        status: { $ref: '#/components/schemas/NodeStatus' }
        progress_percent: { type: integer, minimum: 0, maximum: 100 }
        blocker_message: { type: [string, 'null'] }
        capability: { type: [string, 'null'] }
        skippable: { type: boolean }
    Workspace:
      type: object
      additionalProperties: false
