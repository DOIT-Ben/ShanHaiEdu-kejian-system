openapi: 3.1.0
info:
  title: ShanHaiEdu Web V2 Frontend Required API
  version: 0.2.0-draft
  description: >-
    前端外包所需接口草案（apps/web 工作副本）。基线为
    docs/frontend-outsourcing/v1.0/contracts/frontend-api-requirements.openapi.yaml；
    带 x-frontend-gap: true 的路径与字段为前端补充的需求缺口，
    需在联调前由后端确认并进入正式 OpenAPI。后端发布的版本化正式 OpenAPI
    是联调唯一事实来源。
servers:
  - url: /api/v2
security:
  - sessionCookie: []
tags:
  - name: Auth
  - name: Home
  - name: Projects
  - name: Sources
  - name: Lessons
  - name: Workflows
  - name: Prompts
  - name: Runs
  - name: Artifacts
  - name: Assets
  - name: Tasks
  - name: Delivery
  - name: Templates
  - name: ModelGateway
  - name: Admin
paths:
  /auth/login:
    post:
      tags: [Auth]
      security: []
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          $ref: '#/components/responses/SessionResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /auth/me:
    get:
      tags: [Auth]
      operationId: getCurrentSession
      responses:
        '200':
          $ref: '#/components/responses/SessionResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      responses:
        '204':
          description: Logged out
        default:
          $ref: '#/components/responses/ErrorResponse'
  /home/overview:
    get:
      tags: [Home]
      operationId: getHomeOverview
      x-frontend-gap: true
      responses:
        '200':
          description: Teacher home overview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomeOverviewEnvelope'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /projects:
    get:
      tags: [Projects]
      operationId: listProjects
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/PageSize'
        - in: query
          name: status
          schema: { enum: [draft, active, archived] }
        - in: query
          name: keyword
          schema: { type: string }
        - in: query
          name: sort
          schema: { enum: [updated_desc, created_desc, name_asc] }
      responses:
        '200':
          description: Project page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectPageEnvelope'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Projects]
      operationId: createProject
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectEnvelope'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /projects/{projectId}:
    get:
      tags: [Projects]
      operationId: getProject
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectEnvelope'
        default:
          $ref: '#/components/responses/ErrorResponse'
    patch:
      tags: [Projects]
      operationId: updateProject
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
      responses:
        '200':
          description: Project updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectEnvelope'
        default:
          $ref: '#/components/responses/ErrorResponse'
    delete:
      tags: [Projects]
      operationId: deleteDraftProject
      x-frontend-gap: true
      description: 仅允许删除草稿项目；已激活项目走归档。
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '204':
          description: Draft project deleted
        default:
          $ref: '#/components/responses/ErrorResponse'
  /projects/{projectId}/archive:
    post:
      tags: [Projects]
      operationId: archiveProject
      x-frontend-gap: true
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Project archived
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectEnvelope'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /projects/{projectId}/restore:
    post:
      tags: [Projects]
      operationId: restoreProject
      x-frontend-gap: true
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Project restored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectEnvelope'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /projects/{projectId}/upload-sessions:
    post:
      tags: [Sources]
      operationId: createUploadSession
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUploadSessionRequest'
      responses:
        '201':
          description: Upload session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadSessionEnvelope'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /upload-sessions/{uploadSessionId}/complete:
    post:
      tags: [Sources]
      operationId: completeUploadSession
      x-frontend-gap: true
      parameters:
        - in: path
          name: uploadSessionId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteUploadSessionRequest'
      responses:
        '200':
          description: Upload confirmed; file object created and parse task queued when applicable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadCompletionEnvelope'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /projects/{projectId}/textbook-evidence/current:
    get:
      tags: [Sources]
      operationId: getCurrentTextbookEvidence
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Current textbook evidence
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactVersionEnvelope'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /projects/{projectId}/textbook-evidence/corrections:
    post:
      tags: [Sources]
      operationId: correctTextbookEvidence
      x-frontend-gap: true
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvidenceCorrectionRequest'
      responses:
        '200':
          description: Corrected evidence version
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactVersionEnvelope'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /projects/{projectId}/lesson-divisions/current:
    get:
      tags: [Lessons]
      operationId: getCurrentLessonDivision
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Current lesson division
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactVersionEnvelope'
        default:
          $ref: '#/components/responses/ErrorResponse'
    patch:
      tags: [Lessons]
      operationId: updateLessonDivision
      x-frontend-gap: true
      description: 教师编辑课时划分草稿，携带 row_version 乐观锁；409 返回冲突信息。
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDivisionRequest'
      responses:
        '200':
          description: Updated division version
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactVersionEnvelope'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /projects/{projectId}/lesson-divisions/versions:
    get:
      tags: [Lessons]
      operationId: listLessonDivisionVersions
      x-frontend-gap: true
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Division versions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactVersionPageEnvelope'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /projects/{projectId}/lesson-divisions/runs:
    post:
      tags: [Lessons]
      operationId: regenerateLessonDivision
      x-frontend-gap: true
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DivisionRunRequest'
      responses:
        '202':
          description: Division regeneration accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskEnvelope'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /projects/{projectId}/lesson-divisions/{versionId}/approve:
    post:
      tags: [Lessons]
      operationId: approveLessonDivision
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/VersionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalRequest'
      responses:
        '200':
          description: Approved lesson division and created lessons
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LessonPageEnvelope'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /projects/{projectId}/lessons:
    get:
      tags: [Lessons]
      operationId: listLessons
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Lessons
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LessonPageEnvelope'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /lessons/{lessonId}:
    get:
      tags: [Lessons]
      operationId: getLesson
      parameters:
        - $ref: '#/components/parameters/LessonId'
      responses:
        '200':
          description: Lesson
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LessonEnvelope'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /lessons/{lessonId}/workspace:
    get:
      tags: [Workflows]
      operationId: getLessonWorkspace
      parameters:
        - $ref: '#/components/parameters/LessonId'
      responses:
        '200':
          description: Teacher-facing workflow projection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceEnvelope'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /lessons/{lessonId}/nodes/{nodeKey}:
    get:
      tags: [Workflows]
      operationId: getNodeWorkspace
      parameters:
        - $ref: '#/components/parameters/LessonId'
        - $ref: '#/components/parameters/NodeKey'
      responses:
        '200':
          description: Node workspace
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeWorkspaceEnvelope'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /lessons/{lessonId}/nodes/{nodeKey}/inputs:
    patch:
      tags: [Workflows]
      operationId: updateNodeInputs
      x-frontend-gap: true
      parameters:
        - $ref: '#/components/parameters/LessonId'
        - $ref: '#/components/parameters/NodeKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateNodeInputsRequest'
      responses:
        '200':
          description: Node inputs saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeWorkspaceEnvelope'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /lessons/{lessonId}/nodes/{nodeKey}/draft:
    patch:
      tags: [Workflows]
      operationId: saveNodeDraft
      x-frontend-gap: true
      description: 教师对当前输出的文档式编辑草稿自动保存；不覆盖任何已生成版本。
      parameters:
        - $ref: '#/components/parameters/LessonId'
        - $ref: '#/components/parameters/NodeKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveNodeDraftRequest'
      responses:
        '200':
          description: Draft saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeDraftEnvelope'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /lessons/{lessonId}/nodes/{nodeKey}/transitions:
    post:
      tags: [Workflows]
      operationId: transitionNode
      x-frontend-gap: true
      parameters:
        - $ref: '#/components/parameters/LessonId'
        - $ref: '#/components/parameters/NodeKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NodeTransitionRequest'
      responses:
        '200':
          description: Node transitioned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeWorkspaceEnvelope'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /lessons/{lessonId}/nodes/{nodeKey}/model-options:
    get:
      tags: [Runs]
      operationId: getNodeModelOptions
      x-frontend-gap: true
      parameters:
        - $ref: '#/components/parameters/LessonId'
        - $ref: '#/components/parameters/NodeKey'
      responses:
        '200':
          description: Authorized model options for this node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelOptionsEnvelope'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /lessons/{lessonId}/nodes/{nodeKey}/artifact-versions:
    post:
      tags: [Artifacts]
      operationId: createEditedArtifactVersion
      x-frontend-gap: true
      description: 由教师编辑内容创建新的产物版本（不覆盖历史版本）。
      parameters:
        - $ref: '#/components/parameters/LessonId'
        - $ref: '#/components/parameters/NodeKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEditedVersionRequest'
      responses:
        '201':
          description: New artifact version
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactVersionEnvelope'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /lessons/{lessonId}/nodes/{nodeKey}/prompt-drafts:
    post:
      tags: [Prompts]
      operationId: preparePromptDraft
      parameters:
        - $ref: '#/components/parameters/LessonId'
        - $ref: '#/components/parameters/NodeKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromptDraftRequest'
      responses:
        '201':
          description: Prompt draft
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptVersionEnvelope'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /lessons/{lessonId}/nodes/{nodeKey}/cost-estimate:
    post:
      tags: [Runs]
      operationId: estimateNodeRunCost
      parameters:
        - $ref: '#/components/parameters/LessonId'
        - $ref: '#/components/parameters/NodeKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NodeRunRequest'
      responses:
        '200':
          description: Cost estimate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CostEstimateEnvelope'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /lessons/{lessonId}/nodes/{nodeKey}/budget-authorizations:
    post:
      tags: [Runs]
      operationId: createBudgetAuthorization
      x-frontend-gap: true
      parameters:
        - $ref: '#/components/parameters/LessonId'
        - $ref: '#/components/parameters/NodeKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BudgetAuthorizationRequest'
      responses:
        '201':
          description: Budget authorization granted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetAuthorizationEnvelope'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /lessons/{lessonId}/nodes/{nodeKey}/runs:
    post:
      tags: [Runs]
      operationId: createNodeRun
      parameters:
        - $ref: '#/components/parameters/LessonId'
        - $ref: '#/components/parameters/NodeKey'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NodeRunRequest'
      responses:
        '202':
          description: Node run accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskEnvelope'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /lessons/{lessonId}/nodes/{nodeKey}/items/{itemId}/actions:
    post:
      tags: [Workflows]
      operationId: runNodeItemAction
      x-frontend-gap: true
      description: >-
        针对节点内条目（导入设计单套、PPT 单页、单个镜头、单个片段）的
        局部操作：revise、regenerate、approve、lock_creative_redo_anchor、
        duplicate_as_custom、retry_clip、approve_clip、replace_image。
      parameters:
        - $ref: '#/components/parameters/LessonId'
        - $ref: '#/components/parameters/NodeKey'
        - in: path
          name: itemId
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NodeItemActionRequest'
      responses:
        '200':
          description: Item action result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeItemActionEnvelope'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /artifact-versions/{versionId}:
    get:
      tags: [Artifacts]
      operationId: getArtifactVersion
      x-frontend-gap: true
      parameters:
        - $ref: '#/components/parameters/VersionId'
      responses:
        '200':
          description: Artifact version
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactVersionEnvelope'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /artifact-versions/{versionId}/approve:
    post:
      tags: [Artifacts]
      operationId: approveArtifactVersion
      parameters:
        - $ref: '#/components/parameters/VersionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalRequest'
      responses:
        '200':
          description: Artifact approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactVersionEnvelope'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /artifact-versions/{versionId}/confirm-stale:
    post:
      tags: [Artifacts]
      operationId: confirmStaleArtifactVersion
      x-frontend-gap: true
      description: 上游变化后教师确认沿用当前版本。
      parameters:
        - $ref: '#/components/parameters/VersionId'
      responses:
        '200':
          description: Stale confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactVersionEnvelope'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /projects/{projectId}/assets:
    get:
      tags: [Assets]
      operationId: listProjectAssets
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/PageSize'
        - in: query
          name: type
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: source_node_key
          schema: { type: string }
        - in: query
          name: keyword
          schema: { type: string }
      responses:
        '200':
          description: Assets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetPageEnvelope'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /assets/{assetId}:
    get:
      tags: [Assets]
      operationId: getAssetDetail
      x-frontend-gap: true
      parameters:
        - in: path
          name: assetId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Asset detail with versions and usage references
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetDetailEnvelope'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /file-objects/{fileObjectId}/download-authorizations:
    post:
      tags: [Assets]
      operationId: createDownloadAuthorization
      x-frontend-gap: true
      parameters:
        - in: path
          name: fileObjectId
          required: true
          schema: { type: string }
      responses:
        '201':
          description: Short-lived download authorization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadAuthorizationEnvelope'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /tasks:
    get:
      tags: [Tasks]
      operationId: listMyTasks
      x-frontend-gap: true
      parameters:
        - in: query
          name: scope
          schema: { enum: [mine] }
        - in: query
          name: status
          schema: { type: string }
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Tasks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskPageEnvelope'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /projects/{projectId}/tasks:
    get:
      tags: [Tasks]
      operationId: listProjectTasks
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/PageSize'
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: lesson_id
          schema: { type: string }
        - in: query
          name: node_key
          schema: { type: string }
      responses:
        '200':
          description: Tasks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskPageEnvelope'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /tasks/{taskId}:
    get:
      tags: [Tasks]
      operationId: getTask
      x-frontend-gap: true
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: Task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskEnvelope'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /tasks/{taskId}/cancel:
    post:
      tags: [Tasks]
      operationId: cancelTask
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '202':
          description: Cancellation requested
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskEnvelope'
