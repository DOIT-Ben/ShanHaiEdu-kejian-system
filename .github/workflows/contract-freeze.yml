name: contract-freeze

on:
  pull_request:
    paths:
      - ".github/workflows/contract-freeze.yml"
      - ".github/workflows/development-lease.yml"
      - "contracts/full-chain-freeze.json"
      - "contracts/full-chain-freeze.schema.json"
      - "contracts/page-api-fact-matrix.json"
      - "contracts/page-api-fact-matrix.schema.json"
      - "contracts/development-leases.json"
      - "contracts/development-leases.schema.json"
      - "contracts/fixtures/contract-freeze/**"
      - "contracts/fixtures/parallel-inputs/**"
      - "contracts/fixtures/workflow-node-generation-bindings/**"
      - "contracts/fixtures/primary-math-courseware-package/**"
      - "contracts/api-surface.openapi.yaml"
      - "contracts/planned-api-surface.openapi.yaml"
      - "scripts/check_contract_freeze.py"
      - "scripts/check_development_lease.py"
      - "scripts/check_parallel_fixtures.py"
      - "tests/contract/test_contract_freeze.py"
      - "tests/contract/test_development_lease.py"
      - "tests/contract/test_parallel_fixtures.py"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/contract-freeze.yml"
      - ".github/workflows/development-lease.yml"
      - "contracts/full-chain-freeze.json"
      - "contracts/full-chain-freeze.schema.json"
      - "contracts/page-api-fact-matrix.json"
      - "contracts/page-api-fact-matrix.schema.json"
      - "contracts/development-leases.json"
      - "contracts/development-leases.schema.json"
      - "contracts/fixtures/contract-freeze/**"
      - "contracts/fixtures/parallel-inputs/**"
      - "contracts/fixtures/workflow-node-generation-bindings/**"
      - "contracts/fixtures/primary-math-courseware-package/**"
      - "contracts/api-surface.openapi.yaml"
      - "contracts/planned-api-surface.openapi.yaml"
      - "scripts/check_contract_freeze.py"
      - "scripts/check_development_lease.py"
      - "scripts/check_parallel_fixtures.py"
      - "tests/contract/test_contract_freeze.py"
      - "tests/contract/test_development_lease.py"
      - "tests/contract/test_parallel_fixtures.py"

permissions:
  contents: read

concurrency:
  group: contract-freeze-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.10.6"
          enable-cache: true
          python-version: "3.12"

      - name: Install locked dependencies
        run: uv sync --frozen

      - name: Format contract governance diagnostic copy
        run: >-
          uv run ruff format
          scripts/check_contract_freeze.py
          scripts/check_development_lease.py
          scripts/check_parallel_fixtures.py
          tests/contract/test_contract_freeze.py
          tests/contract/test_development_lease.py
          tests/contract/test_parallel_fixtures.py

      - name: Capture contract governance formatting diff
        run: >-
          git diff --
          scripts/check_contract_freeze.py
          scripts/check_development_lease.py
          scripts/check_parallel_fixtures.py
          tests/contract/test_contract_freeze.py
          tests/contract/test_development_lease.py
          tests/contract/test_parallel_fixtures.py
          > contract-governance-format.diff

      - name: Upload contract governance formatting diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: contract-governance-formatted-sources
          path: |
            contract-governance-format.diff
            scripts/check_contract_freeze.py
            scripts/check_development_lease.py
            scripts/check_parallel_fixtures.py
            tests/contract/test_contract_freeze.py
            tests/contract/test_development_lease.py
            tests/contract/test_parallel_fixtures.py
          if-no-files-found: error
          retention-days: 1

      - name: Reject unformatted contract governance Python
        run: >-
          git diff --exit-code --
          scripts/check_contract_freeze.py
          scripts/check_development_lease.py
          scripts/check_parallel_fixtures.py
          tests/contract/test_contract_freeze.py
          tests/contract/test_development_lease.py
          tests/contract/test_parallel_fixtures.py

      - name: Lint contract governance Python
        run: >-
          uv run ruff check
          scripts/check_contract_freeze.py
          scripts/check_development_lease.py
          scripts/check_parallel_fixtures.py
          tests/contract/test_contract_freeze.py
          tests/contract/test_development_lease.py
          tests/contract/test_parallel_fixtures.py

      - name: Validate full-chain freeze
        run: |
          uv run python scripts/check_contract_freeze.py
          uv run python scripts/check_parallel_fixtures.py

      - name: Run contract governance regression tests
        run: >-
          uv run pytest
          tests/contract/test_contract_freeze.py
          tests/contract/test_development_lease.py
          tests/contract/test_parallel_fixtures.py
