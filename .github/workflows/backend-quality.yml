name: backend-quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: backend-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install locked dependencies
        run: uv sync --frozen

      - name: Format, lint and typecheck
        run: |
          uv run ruff format --check .
          uv run ruff check .
          uv run pyright apps/api workers workflow

      - name: Unit tests
        run: uv run pytest tests/unit

      - name: Tracked secret scan
        run: uv run python scripts/check_tracked_secrets.py

  contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install locked dependencies
        run: |
          uv sync --frozen
          pnpm install --frozen-lockfile

      - name: Contract generation and tests
        run: pnpm contracts:check

      - name: OpenAPI compatibility
        if: github.event_name == 'pull_request'
        run: uv run python scripts/check_openapi_compatibility.py --base-ref origin/${{ github.base_ref }}

  postgres-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16.14-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
        env:
          POSTGRES_USER: shanhai
          POSTGRES_PASSWORD: shanhai-ci-only
          POSTGRES_DB: shanhai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U shanhai -d shanhai_test"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 30
    env:
      SHANHAI_DATABASE_URL: postgresql://shanhai:shanhai-ci-only@127.0.0.1:5432/shanhai_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install locked dependencies
        run: uv sync --frozen

      - name: PostgreSQL integration tests
        run: uv run pytest tests/integration

      - name: Alembic migration cycle when initialized
        run: |
          if [[ -f alembic.ini ]]; then
            uv run alembic upgrade head
            uv run alembic downgrade base
            uv run alembic upgrade head
          else
            echo "Alembic is initialized by Issue #7; no migration files exist on this base yet."
          fi
