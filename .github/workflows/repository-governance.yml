name: repository-governance

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: repository-governance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install repository validation dependency
        run: python -m pip install --disable-pip-version-check PyYAML==6.0.3

      - name: Install locked contract tooling
        run: pnpm install --frozen-lockfile

      - name: Validate active repository tree
        run: bash scripts/check-repository.sh

      - name: Validate CURRENT_STATUS freshness declaration
        if: github.event_name == 'pull_request'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: >-
          python scripts/check_pull_request_status.py
          --base-sha "${{ github.event.pull_request.base.sha }}"
          --head-sha "${{ github.event.pull_request.head.sha }}"
          --body "$PR_BODY"

  branch-name:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Validate task branch name
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if [[ ! "$HEAD_REF" =~ ^(feat|fix|refactor|docs|test|chore|hotfix)/[0-9]+-[a-z0-9]+(-[a-z0-9]+)*$ ]]; then
            echo "Invalid branch name: $HEAD_REF"
            echo "Expected: <type>/<issue-number>-<short-kebab-name>"
            exit 1
          fi
