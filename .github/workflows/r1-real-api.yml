name: r1-real-api

on:
  pull_request:
    paths:
      - ".github/workflows/r1-real-api.yml"
      - "alembic/**"
      - "apps/api/**"
      - "apps/web/**"
      - "contracts/api-surface.openapi.yaml"
      - "contracts/delivery-slice.schema.json"
      - "contracts/delivery-slices/**"
      - "contracts/generated/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "scripts/run_delivery_slice_tests.py"
      - "tests/integration/**"
      - "uv.lock"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/r1-real-api.yml"
      - "alembic/**"
      - "apps/api/**"
      - "apps/web/**"
      - "contracts/api-surface.openapi.yaml"
      - "contracts/delivery-slice.schema.json"
      - "contracts/delivery-slices/**"
      - "contracts/generated/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "scripts/run_delivery_slice_tests.py"
      - "tests/integration/**"
      - "uv.lock"

permissions:
  contents: read

concurrency:
  group: r1-real-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  browser:
    name: R1 real API browser
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16.14-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
        env:
          POSTGRES_DB: shanhai_test
          POSTGRES_PASSWORD: shanhai-ci-only
          POSTGRES_USER: shanhai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U shanhai -d shanhai_test"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 30
      redis:
        image: redis:7.4.9-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 30
    env:
      SHANHAI_DATABASE_URL: postgresql://shanhai:shanhai-ci-only@127.0.0.1:5432/shanhai_test
      SHANHAI_ENVIRONMENT: test
      SHANHAI_REDIS_URL: redis://127.0.0.1:6379/0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"
          version: "0.10.6"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: "22"

      - name: Install locked dependencies
        run: |
          uv sync --frozen
          pnpm install --frozen-lockfile

      - name: Migrate empty database
        run: uv run alembic upgrade head

      - name: Generate ephemeral controlled access code
        run: |
          value="$(openssl rand -hex 32)"
          echo "::add-mask::$value"
          echo "SHANHAI_R1_ACCESS_CODE=$value" >> "$GITHUB_ENV"

      - name: Install Chromium
        run: pnpm --filter @shanhaiedu/web exec playwright install --with-deps chromium

      - name: Start FastAPI
        run: |
          uv run uvicorn apps.api.main:app --host 127.0.0.1 --port 8000 \
            > "$RUNNER_TEMP/r1-api.log" 2>&1 &
          echo "$!" > "$RUNNER_TEMP/r1-api.pid"
          for attempt in {1..60}; do
            if curl --fail --silent http://127.0.0.1:8000/health/live > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat "$RUNNER_TEMP/r1-api.log"
          exit 1

      - name: Run real API browser flow
        run: pnpm --filter @shanhaiedu/web test:e2e:real-api --project=real-api-chromium

      - name: Run exact delivery slice selectors
        run: uv run python scripts/run_delivery_slice_tests.py

      - name: Print API log on failure
        if: failure()
        run: cat "$RUNNER_TEMP/r1-api.log"
