name: development-lease

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - edited
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: development-lease-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout trusted base
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch untrusted PR objects without checkout
        run: >-
          git fetch --no-tags origin
          +refs/pull/${{ github.event.pull_request.number }}/head:refs/remotes/origin/pr-head

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate changed paths with trusted checker
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: >-
          python scripts/check_development_lease.py
          --base ${{ github.event.pull_request.base.sha }}
          --head ${{ github.event.pull_request.head.sha }}
