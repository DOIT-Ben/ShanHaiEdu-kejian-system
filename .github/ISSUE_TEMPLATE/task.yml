name: 开发任务
description: 功能、重构、测试、文档或基础设施任务
title: "[Task] "
body:
  - type: markdown
    attributes:
      value: |
        一个Issue对应一个可独立验收的结果、一个负责人、一个主分支和一个主PR。
  - type: textarea
    id: outcome
    attributes:
      label: 目标结果
      description: 用户或系统最终得到什么可见结果？
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: 范围
      description: 明确做什么。
    validations:
      required: true
  - type: textarea
    id: non_scope
    attributes:
      label: 非范围
      description: 明确本任务不做什么，防止范围膨胀。
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准
      description: 使用可以实际执行或观察的检查项。
      value: |
        - [ ] 验收项一
        - [ ] 验收项二
    validations:
      required: true
  - type: checkboxes
    id: impact
    attributes:
      label: 影响范围
      options:
        - label: 前端
        - label: 后端
        - label: 数据库或迁移
        - label: OpenAPI或JSON Schema
        - label: 工作流或内容包
        - label: 文档
        - label: 模型或媒体Provider
  - type: textarea
    id: dependencies
    attributes:
      label: 依赖、风险与阻塞
      description: 链接前置Issue并说明已知风险；没有则写“无”。
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: 测试与演示
      description: 列出必须运行的测试、构建、迁移或真实产物演示。
    validations:
      required: true
  - type: input
    id: milestone
    attributes:
      label: 目标里程碑
      placeholder: 阶段0 / 阶段1 / 阶段2 / 阶段3 / 阶段4 / 阶段5
    validations:
      required: true
