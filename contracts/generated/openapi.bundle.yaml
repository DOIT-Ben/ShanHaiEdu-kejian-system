        settings:
          type: object
          additionalProperties: true
    Lesson:
      type: object
      additionalProperties: false
      required:
        - id
        - project_id
        - lesson_key
        - position
        - title
        - scope_summary
        - objective_summary
        - estimated_minutes
        - source_division_version_id
        - status
        - lock_version
        - branches
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        lesson_key:
          type: string
          minLength: 1
          maxLength: 80
        position:
          type: integer
          minimum: 1
        title:
          type: string
          minLength: 1
          maxLength: 255
        scope_summary:
          type: string
          minLength: 1
        objective_summary:
          type: string
          minLength: 1
        estimated_minutes:
          type:
            - integer
            - 'null'
          minimum: 1
        source_division_version_id:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - active
            - archived
        lock_version:
          type: integer
          minimum: 1
        branches:
          type: array
          minItems: 4
          maxItems: 4
          items:
            $ref: '#/components/schemas/LessonBranch'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    LessonEnvelope:
      type: object
      additionalProperties: false
      required:
        - data
        - request_id
      properties:
        data:
          $ref: '#/components/schemas/Lesson'
        request_id:
          type: string
          minLength: 1
    LessonCollectionData:
      type: object
      additionalProperties: false
      required:
        - items
        - lock_version
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Lesson'
        lock_version:
          type: integer
          minimum: 1
    LessonCollectionEnvelope:
      type: object
      additionalProperties: false
      required:
        - data
        - request_id
      properties:
        data:
          $ref: '#/components/schemas/LessonCollectionData'
        request_id:
          type: string
          minLength: 1
    LessonCollectionItemUpdate:
      type: object
      additionalProperties: false
      required:
        - id
        - position
        - title
        - scope_summary
        - objective_summary
        - estimated_minutes
      properties:
        id:
          type: string
          format: uuid
        position:
          type: integer
          minimum: 1
        title:
          type: string
          minLength: 1
          maxLength: 255
        scope_summary:
          type: string
          minLength: 1
        objective_summary:
          type: string
          minLength: 1
        estimated_minutes:
          type:
            - integer
            - 'null'
          minimum: 1
    UpdateLessonCollectionRequest:
      type: object
      additionalProperties: false
      required:
        - items
      properties:
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/LessonCollectionItemUpdate'
    LessonBranchUpdate:
      type: object
      additionalProperties: false
      required:
        - branch_key
        - enabled
        - settings
      properties:
        branch_key:
          $ref: '#/components/schemas/LessonBranchKey'
        enabled:
          type: boolean
        settings:
          type: object
          additionalProperties: true
    UpdateLessonBranchesRequest:
      type: object
      additionalProperties: false
      required:
        - branches
      properties:
        branches:
          type: array
          minItems: 1
          maxItems: 4
          items:
            $ref: '#/components/schemas/LessonBranchUpdate'
    CreateUploadSessionRequest:
      type: object
      additionalProperties: false
      required:
        - filename
        - media_type
        - size_bytes
        - sha256
      properties:
        filename:
          type: string
          minLength: 1
          maxLength: 255
        media_type:
          type: string
          minLength: 1
          maxLength: 255
        size_bytes:
          type: integer
          minimum: 1
        sha256:
          type: string
          pattern: ^[a-f0-9]{64}$
    UploadSession:
      type: object
      additionalProperties: false
      required:
        - upload_session_id
        - material_id
        - upload_url
        - method
        - required_headers
        - expires_at
      properties:
        upload_session_id:
          type: string
          format: uuid
        material_id:
          type: string
          format: uuid
        upload_url:
          type: string
          format: uri
        method:
          const: PUT
        required_headers:
          type: object
          additionalProperties:
            type: string
        expires_at:
          type: string
          format: date-time
    UploadSessionEnvelope:
      type: object
      additionalProperties: false
      required:
        - data
