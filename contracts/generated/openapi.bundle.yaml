      $schema: https://json-schema.org/draft/2020-12/schema
      $id: https://shanhaiedu.local/contracts/creation-package.schema.json
      title: CreationPackage
      type: object
      additionalProperties: false
      required:
        - package_id
        - package_type
        - status
        - source
        - items
        - created_at
      properties:
        package_id:
          type: string
          format: uuid
        package_type:
          enum:
            - image
            - video
            - presentation
        status:
          enum:
            - building
            - ready
            - invalid
            - expired
        source:
          type: object
          additionalProperties: false
          required:
            - project_id
            - node_run_id
          properties:
            project_id:
              type: string
              format: uuid
            lesson_unit_id:
              type:
                - string
                - 'null'
              format: uuid
            node_run_id:
              type: string
              format: uuid
            is_stale:
              type: boolean
              default: false
        style_contract:
          type:
            - object
            - 'null'
          additionalProperties: true
        items:
          type: array
          minItems: 1
          items:
            type: object
            additionalProperties: false
            required:
              - item_key
              - position
              - title
              - prompt
              - output_spec
            properties:
              item_key:
                type: string
                minLength: 1
              position:
                type: integer
                minimum: 1
              title:
                type: string
                minLength: 1
              prompt:
                type: object
                additionalProperties: true
              reference_assets:
                type: array
                items:
                  type: object
                  required:
                    - asset_version_id
                    - role
                  properties:
                    asset_version_id:
                      type: string
                      format: uuid
                    role:
                      type: string
                  additionalProperties: false
              output_spec:
                type: object
                additionalProperties: true
              target_slot_key:
                type:
                  - string
                  - 'null'
              consistency_key:
                type:
                  - string
                  - 'null'
        target_rules:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
