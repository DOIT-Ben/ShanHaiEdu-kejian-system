        - $ref: '#/components/schemas/LegacyProject'
        - $ref: '#/components/schemas/CurrentProject'
    ProjectEnvelope:
      type: object
      required:
        - data
        - request_id
      properties:
        data:
          $ref: '#/components/schemas/Project'
        request_id:
          type: string
    ProjectListEnvelope:
      type: object
