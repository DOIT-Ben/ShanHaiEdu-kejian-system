openapi: 3.1.0
info:
  title: ShanHaiEdu Core Integration Surface
  version: 3.1.0
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
  description: 当前可调用的核心联调合同。operationId 必须与后端运行时 OpenAPI 双向一致； 尚未实现的接口只允许进入 planned-api-surface.openapi.yaml。
servers:
  - url: /api/v2
security:
  - cookieAuth: []
paths:
  /health/live:
    get:
      summary: API进程存活检查
      operationId: getLiveness
      security: []
      responses:
        '200':
          description: API process is alive; this check has no external dependencies
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LivenessEnvelope'
        4XX:
          $ref: '#/components/responses/Error'
  /health/ready:
    get:
      summary: API依赖就绪检查
      operationId: getReadiness
      security: []
      responses:
        '200':
          description: All required dependencies are ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessEnvelope'
        '503':
          description: One or more required dependencies are unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessEnvelope'
        4XX:
          $ref: '#/components/responses/Error'
  /auth/session:
    post:
      summary: 使用受控访问码建立教师会话
      operationId: createSession
      security:
        - BrowserOrigin: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '201':
          description: Session created and returned in a Secure HttpOnly cookie
          headers:
            Set-Cookie:
              schema:
                type: string
            Cache-Control:
              schema:
                type: string
                const: no-store
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionEnvelope'
        '503':
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
    get:
      summary: 恢复当前教师会话
      operationId: getCurrentSession
      responses:
        '200':
          description: Current public principal, expiry and bound CSRF token
          headers:
            Cache-Control:
              schema:
                type: string
                const: no-store
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionEnvelope'
        '503':
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
    delete:
      summary: 撤销当前教师会话
      operationId: deleteSession
      security:
        - BrowserOrigin: []
          CsrfToken: []
          cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '204':
          description: Session revoked and cookie expired
          headers:
            Cache-Control:
              schema:
                type: string
                const: no-store
        '503':
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
  /projects:
    get:
      summary: 查询项目列表
      operationId: listProjects
      parameters:
        - $ref: '#/components/parameters/PageCursor'
        - $ref: '#/components/parameters/PageLimit'
      responses:
        '200':
          description: Project page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectListEnvelope'
        4XX:
          $ref: '#/components/responses/Error'
    post:
      summary: 创建单知识点项目
      operationId: createProject
      security:
        - BrowserOrigin: []
          CsrfToken: []
          cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectEnvelope'
        4XX:
          $ref: '#/components/responses/Error'
  /projects/{project_id}:
    get:
      summary: 获取项目详情
      operationId: getProject
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Project
          headers:
            ETag:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectEnvelope'
        4XX:
          $ref: '#/components/responses/Error'
  /projects/{project_id}/automation-policy:
    get:
      summary: 查询项目当前自动化策略
      operationId: getProjectAutomationPolicy
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Versioned policy controlling pauses and automatic actions
          headers:
            ETag:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationPolicyEnvelope'
        4XX:
          $ref: '#/components/responses/Error'
    patch:
      summary: 调整项目自动化策略
      operationId: updateProjectAutomationPolicy
      security:
        - BrowserOrigin: []
          CsrfToken: []
          cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAutomationPolicyRequest'
      responses:
        '200':
          description: Updated automation policy
          headers:
            ETag:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationPolicyEnvelope'
        4XX:
          $ref: '#/components/responses/Error'
  /projects/{project_id}/asset-slots:
    get:
      summary: 查询项目资产槽位及当前活动绑定
      operationId: listProjectAssetSlots
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - name: lesson_unit_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: slot_key
          in: query
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 160
        - $ref: '#/components/parameters/PageCursor'
        - $ref: '#/components/parameters/PageLimit'
      responses:
        '200':
          description: Authorized project asset slot page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectAssetSlotListEnvelope'
        4XX:
          $ref: '#/components/responses/Error'
  /projects/{project_id}/asset-package:
    get:
      summary: 查询项目资产包聚合视图
      operationId: getProjectAssetPackage
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - name: lesson_unit_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: slot_key
          in: query
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 160
        - $ref: '#/components/parameters/PageCursor'
        - $ref: '#/components/parameters/PageLimit'
      responses:
        '200':
          description: Authorized project asset package page without storage URLs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectAssetPackageEnvelope'
        4XX:
          $ref: '#/components/responses/Error'
  /asset-slots/{slot_id}/bindings:
    post:
      summary: 幂等绑定、追加或替换项目资产
      operationId: bindProjectAsset
      security:
        - BrowserOrigin: []
          CsrfToken: []
          cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/AssetSlotId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BindAssetRequest'
      responses:
        '201':
          description: Asset binding created atomically with audit and outbox
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetBindingEnvelope'
        4XX:
          $ref: '#/components/responses/Error'
  /asset-bindings/{binding_id}/unbind:
    post:
      summary: 幂等停用项目资产绑定并保留历史
      operationId: unbindProjectAsset
      security:
        - BrowserOrigin: []
          CsrfToken: []
          cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/AssetBindingId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '200':
          description: Asset binding deactivated without deleting history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetBindingEnvelope'
        4XX:
          $ref: '#/components/responses/Error'
  /projects/{project_id}/lessons:
    get:
      summary: 查询项目当前活动课时
      operationId: listProjectLessons
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Ordered active lesson collection
          headers:
            ETag:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LessonCollectionEnvelope'
        4XX:
          $ref: '#/components/responses/Error'
    patch:
      summary: 原子更新、重排或归档项目课时
      operationId: updateProjectLessons
      security:
        - BrowserOrigin: []
          CsrfToken: []
          cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLessonCollectionRequest'
      responses:
        '200':
          description: Updated ordered active lesson collection
          headers:
            ETag:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LessonCollectionEnvelope'
        4XX:
          $ref: '#/components/responses/Error'
  /lessons/{lesson_id}:
    get:
      summary: 获取课时及分支配置
      operationId: getLesson
      parameters:
        - $ref: '#/components/parameters/LessonId'
      responses:
        '200':
          description: Lesson with all branch configurations
          headers:
            ETag:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LessonEnvelope'
        4XX:
          $ref: '#/components/responses/Error'
  /lessons/{lesson_id}/branches:
    patch:
      summary: 更新课时分支开关
      operationId: updateLessonBranches
      security:
        - BrowserOrigin: []
          CsrfToken: []
          cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/LessonId'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLessonBranchesRequest'
      responses:
        '200':
          description: Updated lesson branch configuration
          headers:
            ETag:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LessonEnvelope'
        4XX:
          $ref: '#/components/responses/Error'
  /lessons/{lesson_id}/intro-options:
    get:
      summary: 获取课时导入方案与当前选择
      operationId: getLessonIntroOptions
      parameters:
        - $ref: '#/components/parameters/LessonId'
      responses:
        '200':
          description: Safe approved, pending, and current-selection projection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntroOptionsEnvelope'
        4XX:
          $ref: '#/components/responses/Error'
  /lessons/{lesson_id}/intro-selections:
    post:
      summary: 教师选择一个已批准课堂导入方案
      operationId: selectLessonIntroOption
      security:
        - BrowserOrigin: []
          CsrfToken: []
          cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/LessonId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SelectIntroOptionRequest'
      responses:
        '201':
          description: Immutable teacher selection created or replayed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntroSelectionEnvelope'
        4XX:
          $ref: '#/components/responses/Error'
  /projects/{project_id}/materials/uploads:
    post:
      summary: 创建教材私有直传会话
      operationId: createMaterialUploadSession
      security:
        - BrowserOrigin: []
          CsrfToken: []
          cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUploadSessionRequest'
      responses:
        '201':
          description: Presigned upload session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadSessionEnvelope'
        4XX:
          $ref: '#/components/responses/Error'
  /projects/{project_id}/materials/{material_id}/confirm:
    post:
      summary: 确认教材对象并创建后台任务
      operationId: confirmMaterialUpload
      security:
        - BrowserOrigin: []
          CsrfToken: []
          cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/MaterialId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmUploadRequest'
      responses:
        '202':
          $ref: '#/components/responses/AcceptedJob'
        4XX:
          $ref: '#/components/responses/Error'
  /projects/{project_id}/materials/{material_id}/file-asset:
    get:
      summary: 获取教材稳定文件资产与当前版本元数据
      operationId: getSourceMaterialFileAsset
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/MaterialId'
      responses:
        '200':
          description: Stable file identity and safe current-version metadata
          headers:
            ETag:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileAssetEnvelope'
        4XX:
          $ref: '#/components/responses/Error'
  /projects/{project_id}/materials/{material_id}/parse-versions:
    get:
      summary: 查询教材解析版本摘要
      operationId: listMaterialParseVersions
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/MaterialId'
      responses:
        '200':
          description: Newest-first material parse version summaries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaterialParseVersionListEnvelope'
        4XX:
          $ref: '#/components/responses/Error'
  /projects/{project_id}/workflow:
    get:
      summary: 获取项目工作台聚合状态
      operationId: getProjectWorkflow
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Aggregated workbench state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowEnvelope'
        4XX:
          $ref: '#/components/responses/Error'
  /projects/{project_id}/artifacts:
    post:
      summary: 创建项目内容产物及活动草稿
      operationId: createArtifact
      security:
        - BrowserOrigin: []
          CsrfToken: []
          cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateArtifactRequest'
      responses:
        '201':
          description: Artifact and its initial active draft created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactEnvelope'
        4XX:
          $ref: '#/components/responses/Error'
  /artifacts/{artifact_id}:
    get:
      summary: 读取产物当前草稿和版本指针
      operationId: getArtifact
      parameters:
        - $ref: '#/components/parameters/ArtifactId'
      responses:
        '200':
          description: Current artifact state
          headers:
            ETag:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactEnvelope'
        4XX:
          $ref: '#/components/responses/Error'
  /artifacts/{artifact_id}/drafts/{draft_branch}:
    put:
      summary: 乐观锁自动保存活动草稿
      operationId: saveArtifactDraft
      security:
        - BrowserOrigin: []
          CsrfToken: []
          cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/ArtifactId'
        - $ref: '#/components/parameters/DraftBranch'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveArtifactDraftRequest'
      responses:
        '200':
          description: Draft saved
          headers:
            ETag:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactDraftEnvelope'
        4XX:
          $ref: '#/components/responses/Error'
  /artifacts/{artifact_id}/versions:
    post:
      summary: 从活动草稿提交不可变版本
      operationId: submitArtifactVersion
      security:
        - BrowserOrigin: []
          CsrfToken: []
          cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/ArtifactId'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitArtifactVersionRequest'
      responses:
        '201':
          description: Immutable artifact version submitted for review
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactVersionEnvelope'
        4XX:
          $ref: '#/components/responses/Error'
  /artifact-versions/{artifact_version_id}/approvals:
    post:
      summary: 追加产物版本审核动作
      operationId: reviewArtifactVersion
      security:
        - BrowserOrigin: []
          CsrfToken: []
          cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/ArtifactVersionId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewArtifactVersionRequest'
      responses:
        '201':
          description: Approval action appended and artifact pointers updated atomically
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalEnvelope'
        4XX:
          $ref: '#/components/responses/Error'
  /node-runs/{node_run_id}/prompt-preview:
    get:
      summary: 获取节点最终业务提示词预览
      operationId: getPromptPreview
      parameters:
        - $ref: '#/components/parameters/NodeRunId'
      responses:
        '200':
          description: Editable business prompt and its edit policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptPreviewEnvelope'
        4XX:
          $ref: '#/components/responses/Error'
  /creation-batches:
    post:
      summary: 创建通用创作批次
      operationId: createCreationBatch
      security:
        - BrowserOrigin: []
          CsrfToken: []
          cookieAuth: []
      description: New consumers must send the source_kind discriminated contract. The legacy branch is accepted only during migration and is deprecated.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompatibleCreateCreationBatchRequest'
      responses:
        '201':
          description: Creation batch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreationBatchEnvelope'
        4XX:
          $ref: '#/components/responses/Error'
  /creation-batches/{batch_id}/generate:
    post:
      summary: 批量生成创作候选
      operationId: generateCreationBatch
      security:
        - BrowserOrigin: []
          CsrfToken: []
          cookieAuth: []
      description: The current branch pins each item to an immutable prompt_version_id. The legacy item_ids branch remains accepted during migration and is deprecated.
      parameters:
        - $ref: '#/components/parameters/BatchId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompatibleGenerateCreationBatchRequest'
      responses:
        '202':
          $ref: '#/components/responses/AcceptedJob'
        4XX:
          $ref: '#/components/responses/Error'
  /creation-items/{item_id}/prompt-versions:
    post:
      summary: 保存创作条目业务提示词版本
      operationId: saveCreationPromptVersion
      security:
        - BrowserOrigin: []
          CsrfToken: []
          cookieAuth: []
      description: Saves the editable business prompt without starting generation.
      parameters:
        - $ref: '#/components/parameters/CreationItemId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SavePromptVersionRequest'
      responses:
        '201':
          description: Immutable prompt version saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptVersionEnvelope'
        4XX:
          $ref: '#/components/responses/Error'
  /creation-items/{item_id}/generate:
    post:
      summary: 基于固定提示词版本生成候选
      operationId: generateCreationItem
      security:
        - BrowserOrigin: []
          CsrfToken: []
          cookieAuth: []
      description: Freezes the selected prompt version and inputs into a generation job snapshot.
      parameters:
        - $ref: '#/components/parameters/CreationItemId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateCreationItemRequest'
      responses:
        '202':
          $ref: '#/components/responses/AcceptedJob'
        4XX:
          $ref: '#/components/responses/Error'
  /generation-results/{result_id}/adoptions:
    post:
      summary: 采用候选但不写回项目
      operationId: adoptGenerationResult
      security:
        - BrowserOrigin: []
          CsrfToken: []
          cookieAuth: []
      description: Records a teacher or automation-policy adoption; it never creates an asset binding.
      parameters:
        - $ref: '#/components/parameters/GenerationResultId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdoptGenerationResultRequest'
      responses:
        '201':
          description: Adoption recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdoptionEnvelope'
        4XX:
          $ref: '#/components/responses/Error'
  /adoptions/{adoption_id}/save-to-project:
    post:
      summary: 把已采用候选写回项目
      operationId: saveAdoptionToProject
      security:
        - BrowserOrigin: []
          CsrfToken: []
          cookieAuth: []
      description: Project-source adoptions use the immutable CreationPackage target and reject target overrides. Standalone adoptions require an explicitly authorized project and slot.
      parameters:
        - $ref: '#/components/parameters/AdoptionId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveAdoptionToProjectRequest'
      responses:
        '200':
          description: Adopted candidate saved atomically
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaveToProjectOperationEnvelope'
        4XX:
          $ref: '#/components/responses/Error'
  /generation-results/{result_id}/save-to-project:
    post:
      summary: 兼容旧客户端的候选直接写回入口
      operationId: saveGenerationResultToProject
      security:
        - BrowserOrigin: []
          CsrfToken: []
          cookieAuth: []
      deprecated: true
      description: Legacy adapter only. The server must audit adoption and save as separate facts. New clients use POST /generation-results/{result_id}/adoptions followed by POST /adoptions/{adoption_id}/save-to-project.
      parameters:
        - name: result_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - project_id
                - slot_key
                - replace_mode
              properties:
                project_id:
                  type: string
                  format: uuid
                slot_key:
                  type: string
                  minLength: 1
                replace_mode:
                  enum:
                    - reject_if_occupied
                    - replace_active
                    - append
      responses:
        '200':
          description: Result saved atomically
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaveOperationEnvelope'
        4XX:
          $ref: '#/components/responses/Error'
  /generation-jobs/{job_id}:
    get:
      summary: 查询异步任务事实状态
      operationId: getGenerationJob
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Generation job state from PostgreSQL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerationJobEnvelope'
        4XX:
          $ref: '#/components/responses/Error'
  /generation-jobs/{job_id}/cancel:
    post:
      summary: 请求协作式取消异步任务
      operationId: cancelGenerationJob
      security:
        - BrowserOrigin: []
          CsrfToken: []
          cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/JobId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '202':
          description: Cancellation requested
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerationJobEnvelope'
        4XX:
          $ref: '#/components/responses/Error'
  /generation-jobs/{job_id}/events/stream:
    get:
      summary: 订阅单任务实时事件
      operationId: streamGenerationJobEvents
      parameters:
        - $ref: '#/components/parameters/JobId'
        - $ref: '#/components/parameters/LastEventId'
      responses:
        '200':
          description: Server-sent event stream; data follows sse-event.schema.json
          content:
            text/event-stream:
              schema:
                type: string
        4XX:
          $ref: '#/components/responses/Error'
  /projects/{project_id}/events/stream:
    get:
      summary: 订阅项目实时事件
      operationId: streamProjectEvents
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/LastEventId'
      responses:
        '200':
          description: Server-sent event stream; data follows sse-event.schema.json
          content:
            text/event-stream:
              schema:
                type: string
        4XX:
          $ref: '#/components/responses/Error'
components:
  securitySchemes:
    BrowserOrigin:
      type: apiKey
      in: header
      name: Origin
      description: Browser-controlled request origin. User agents attach this header; application callers must not synthesize it from user input.
    CsrfToken:
      type: apiKey
      in: header
      name: X-CSRF-Token
      description: Server-issued token bound to the current session and injected by the web client.
    cookieAuth:
      type: apiKey
      in: cookie
      name: shanhai_session
      description: Server-issued Secure HttpOnly session resolved through the authentication adapter. Organization and user identity headers are not accepted.
  parameters:
    CsrfToken:
      name: X-CSRF-Token
      in: header
      required: true
      schema:
        type: string
        minLength: 64
        maxLength: 64
    ProjectId:
      name: project_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    NodeRunId:
      name: node_run_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    LessonId:
      name: lesson_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    BatchId:
      name: batch_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CreationItemId:
      name: item_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    GenerationResultId:
      name: result_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AdoptionId:
      name: adoption_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MaterialId:
      name: material_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    JobId:
      name: job_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ArtifactId:
      name: artifact_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ArtifactVersionId:
      name: artifact_version_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AssetSlotId:
      name: slot_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AssetBindingId:
      name: binding_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DraftBranch:
      name: draft_branch
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 80
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 128
    IfMatch:
      name: If-Match
      in: header
      required: true
      schema:
        type: string
    LastEventId:
      name: Last-Event-ID
      in: header
      required: false
      schema:
        type: string
        minLength: 1
    PageCursor:
      name: page[cursor]
      in: query
      required: false
      schema:
        type: string
    PageLimit:
      name: page[limit]
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
  responses:
    Error:
      description: Error envelope
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/error-envelope.schema'
    AcceptedJob:
      description: Long-running job accepted
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AcceptedJobEnvelope'
  schemas:
    CreateSessionRequest:
      type: object
      additionalProperties: false
      required:
        - access_code
      properties:
        access_code:
          type: string
          minLength: 1
          maxLength: 512
          writeOnly: true
    SessionPrincipal:
      type: object
      additionalProperties: false
      required:
        - principal_id
        - user_id
        - organization_id
        - display_name
        - organization_name
        - organization_role
      properties:
        principal_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        display_name:
          type: string
          minLength: 1
          maxLength: 160
        organization_name:
          type: string
          minLength: 1
          maxLength: 160
        organization_role:
          enum:
            - owner
            - admin
            - member
    CurrentSession:
      type: object
      additionalProperties: false
      required:
        - session_id
        - principal
        - expires_at
        - csrf_token
      properties:
        session_id:
          type: string
          format: uuid
        principal:
          $ref: '#/components/schemas/SessionPrincipal'
        expires_at:
          type: string
          format: date-time
        csrf_token:
          type: string
          minLength: 64
          maxLength: 64
    SessionEnvelope:
      type: object
      additionalProperties: false
      required:
        - data
        - request_id
      properties:
        data:
          $ref: '#/components/schemas/CurrentSession'
        request_id:
          type: string
          minLength: 1
    IntroOptionSet:
      $ref: '#/components/schemas/intro-option-set.schema'
    IntroOption:
      $ref: '#/components/schemas/option'
    IntroOptionSetPublic:
      type: object
      additionalProperties: false
      required:
        - generation_mode
        - lesson_unit_key
        - knowledge_point
        - options
        - created_at
      properties:
        generation_mode:
          type: string
          enum:
            - default_nine
            - refine_existing
        lesson_unit_key:
          type: string
          minLength: 1
        knowledge_point:
          type: string
          minLength: 1
        options:
          type: array
          minItems: 1
          maxItems: 9
          items:
            $ref: '#/components/schemas/option'
        created_at:
          type: string
          format: date-time
    IntroOptionVersion:
      type: object
      additionalProperties: false
      required:
        - artifact_version_id
        - version_no
        - approval_status
        - stale
        - selectable
        - option_set
      properties:
        artifact_version_id:
          type: string
          format: uuid
        version_no:
          type: integer
          minimum: 1
        approval_status:
          type: string
          enum:
            - approved
            - pending_review
            - changes_requested
            - revoked
            - unapproved
        stale:
          type: boolean
        selectable:
          type: boolean
        option_set:
          $ref: '#/components/schemas/IntroOptionSetPublic'
    IntroSelection:
      type: object
      additionalProperties: false
      required:
        - selection_id
        - artifact_version_id
        - option_key
        - selection_method
        - snapshot
        - reason
        - active
        - consumable
        - unconsumable_reason
        - selected_at
        - deactivated_at
      properties:
        selection_id:
          type: string
          format: uuid
        artifact_version_id:
          type: string
          format: uuid
        option_key:
          type: string
          minLength: 1
          maxLength: 120
        selection_method:
          type: string
          enum:
            - teacher_selected
            - policy_default
        snapshot:
          $ref: '#/components/schemas/option'
        reason:
          type: string
          minLength: 1
        active:
          type: boolean
        consumable:
          type: boolean
        unconsumable_reason:
          type:
            - string
            - 'null'
        selected_at:
          type: string
          format: date-time
        deactivated_at:
          type:
            - string
            - 'null'
          format: date-time
    IntroOptions:
      type: object
      additionalProperties: false
      required:
        - artifact_id
        - current_approved_version_id
        - display_version
        - pending_version
        - current_selection
      properties:
        artifact_id:
          type: string
          format: uuid
        current_approved_version_id:
          type:
            - string
            - 'null'
          format: uuid
        display_version:
          oneOf:
            - $ref: '#/components/schemas/IntroOptionVersion'
            - type: 'null'
        pending_version:
          oneOf:
            - $ref: '#/components/schemas/IntroOptionVersion'
            - type: 'null'
        current_selection:
          oneOf:
            - $ref: '#/components/schemas/IntroSelection'
            - type: 'null'
    IntroOptionsEnvelope:
      type: object
      additionalProperties: false
      required:
        - data
        - request_id
      properties:
        data:
          $ref: '#/components/schemas/IntroOptions'
        request_id:
          type: string
          minLength: 1
    SelectIntroOptionRequest:
      type: object
      additionalProperties: false
      required:
        - artifact_version_id
        - option_key
      properties:
        artifact_version_id:
          type: string
          format: uuid
        option_key:
          type: string
          minLength: 1
          maxLength: 120
    IntroSelectionEnvelope:
      type: object
      additionalProperties: false
      required:
        - data
        - request_id
      properties:
        data:
          $ref: '#/components/schemas/IntroSelection'
        request_id:
          type: string
          minLength: 1
    AutomationMode:
      type: string
      enum:
        - manual
        - assisted
        - automatic
      deprecated: true
      description: Legacy project field. manual maps to guided with automatic node actions disabled; assisted maps to guided while preserving node rules; automatic remains automatic.
    AutomationPolicyMode:
      type: string
      enum:
        - guided
        - automatic
    AutomationNodeRule:
      type: object
      additionalProperties: false
      required:
        - node_key
      properties:
        node_key:
          type: string
          minLength: 1
          maxLength: 120
        auto_start:
          type: boolean
        auto_submit:
          type: boolean
        auto_approve:
          type: boolean
        auto_select:
          type: boolean
        auto_adopt:
          type: boolean
        auto_save_to_project:
          type: boolean
        pause_after:
          type: boolean
    AutomationPolicy:
      type: object
      additionalProperties: false
      required:
        - project_id
        - workflow_definition_version_id
        - mode
        - node_rules
        - policy_version
        - updated_at
      properties:
        project_id:
          type: string
          format: uuid
        workflow_definition_version_id:
          type: string
          format: uuid
        mode:
          $ref: '#/components/schemas/AutomationPolicyMode'
        node_rules:
          type: array
          items:
            $ref: '#/components/schemas/AutomationNodeRule'
        policy_version:
          type: integer
          minimum: 1
        updated_at:
          type: string
          format: date-time
    AutomationPolicyEnvelope:
      type: object
      additionalProperties: false
      required:
        - data
        - request_id
      properties:
        data:
          $ref: '#/components/schemas/AutomationPolicy'
        request_id:
          type: string
          minLength: 1
    UpdateAutomationPolicyRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        mode:
          $ref: '#/components/schemas/AutomationPolicyMode'
        node_rules:
          type: array
          items:
            $ref: '#/components/schemas/AutomationNodeRule'
    LegacyProject:
      type: object
      additionalProperties: false
      required:
        - id
        - title
        - subject
        - knowledge_point
        - status
        - automation_mode
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        subject:
          const: primary_math
        grade:
          type:
            - string
            - 'null'
        textbook_edition:
          type:
            - string
            - 'null'
        knowledge_point:
          type: string
        status:
          enum:
            - draft
            - active
            - archived
        automation_mode:
          $ref: '#/components/schemas/AutomationMode'
        content_release_id:
          type: string
          format: uuid
        workflow_definition_version_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CurrentProject:
      type: object
      additionalProperties: false
      required:
        - id
        - title
        - subject
        - knowledge_point
        - status
        - execution_mode
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        subject:
          const: primary_math
        grade:
          type:
            - string
            - 'null'
        textbook_edition:
          type:
            - string
            - 'null'
        knowledge_point:
          type: string
        status:
          enum:
            - draft
            - active
            - archived
        execution_mode:
          $ref: '#/components/schemas/AutomationPolicyMode'
        content_release_id:
          type: string
          format: uuid
        workflow_definition_version_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Project:
